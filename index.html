<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkStudio Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg:#090708;--surface:#121013;--surface2:#181519;--border:rgba(255,255,255,.08);--text:#f5f2f3;--muted:#a7a0a4;--accent:#d62828;--gold:#f0b35a;--good:#22c55e;--shadow:0 24px 80px rgba(214,40,40,.18);--bg1:#2b1015;--bg2:#100d10;--bg3:#090708;--bg4:#060506}
    body.theme-rojo{--accent:#d62828;--gold:#f0b35a;--shadow:0 24px 80px rgba(214,40,40,.18);--bg1:#2b1015;--bg2:#100d10;--bg3:#090708;--bg4:#060506}
    body.theme-morado{--accent:#8b5cf6;--gold:#c4b5fd;--shadow:0 24px 80px rgba(139,92,246,.22);--bg1:#24103a;--bg2:#151022;--bg3:#0b0710;--bg4:#050308}
    body.theme-azul{--accent:#0ea5e9;--gold:#93c5fd;--shadow:0 24px 80px rgba(14,165,233,.20);--bg1:#082f49;--bg2:#071b2d;--bg3:#050b14;--bg4:#02060a}
    body.theme-verde{--accent:#10b981;--gold:#86efac;--shadow:0 24px 80px rgba(16,185,129,.18);--bg1:#073b2f;--bg2:#08231d;--bg3:#04110e;--bg4:#020806}
    body.theme-dorado{--accent:#d97706;--gold:#fbbf24;--shadow:0 24px 80px rgba(217,119,6,.20);--bg1:#3a2606;--bg2:#1f1608;--bg3:#0d0a05;--bg4:#050402}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 28%,var(--bg3) 68%,var(--bg4) 100%);color:var(--text)}
    .display{font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;letter-spacing:.06em;text-transform:uppercase}.shell{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.sidebar{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));border-right:1px solid var(--border);padding:24px;position:sticky;top:0;height:100vh}.logo-wrap{display:flex;gap:14px;align-items:center;margin-bottom:28px}.logo-mark{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,color-mix(in srgb, var(--accent) 72%, white) 0%,var(--accent) 45%,#541111 100%);display:grid;place-items:center;box-shadow:var(--shadow);animation:pulse 3.5s ease-in-out infinite}.nav button{width:100%;display:flex;gap:12px;align-items:center;padding:14px 16px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:16px;margin-bottom:8px;transition:.2s;text-align:left}.nav button:hover,.nav button.active{background:linear-gradient(90deg,rgba(214,40,40,.18),rgba(214,40,40,.04));border-color:rgba(214,40,40,.22);color:#fff;transform:translateX(3px)}
    .content{padding:28px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(214,40,40,.12),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:28px;padding:34px;box-shadow:var(--shadow)}.badge{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid rgba(240,179,90,.24);background:rgba(240,179,90,.08);color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0}.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));border:1px solid var(--border);border-radius:24px;padding:20px;transition:.2s;min-width:0}.card:hover{transform:translateY(-2px);border-color:rgba(214,40,40,.18)}.grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.client-card{cursor:pointer}.client-card:hover{transform:translateY(-2px);border-color:rgba(214,40,40,.28)}
    .table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:18px}.table{width:100%;min-width:720px;border-collapse:collapse}.table td,.table th{padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}.list{display:grid;gap:12px}.appt{display:flex;justify-content:space-between;gap:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.btn{border:none;border-radius:16px;padding:14px 18px;font-weight:700;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,color-mix(in srgb, var(--accent) 72%, white),var(--accent));color:#fff;box-shadow:0 14px 34px rgba(214,40,40,.25)}.btn-ghost{background:rgba(255,255,255,.03);border:1px solid var(--border);color:#fff}.btn-small{padding:8px 10px;border-radius:12px;font-size:12px}.muted{color:var(--muted)} .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}.section{display:none}.section.active{display:block}.tiny{font-size:12px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-input{width:100%;background:#0f0d0e;border:1px solid rgba(255,255,255,.09);color:#fff;padding:12px 14px;border-radius:14px;outline:none}.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(214,40,40,.16)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal.active{display:flex}.modal-box{width:min(950px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#151214,#0f0d0e);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:22px}.empty-state{border:1px dashed rgba(255,255,255,.18);border-radius:18px;padding:22px;background:rgba(255,255,255,.025);color:var(--muted)}.notice{border:1px solid rgba(240,179,90,.22);background:rgba(240,179,90,.07);border-radius:18px;padding:14px;color:#f9d7a1}.ok{border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.08);border-radius:18px;padding:14px;color:#bbf7d0}.watermark{position:fixed;right:18px;bottom:14px;color:rgba(255,255,255,.18);font-size:11px;z-index:1;pointer-events:none}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.main-title{font-size:54px;margin:10px 0 8px}.section-title{font-size:34px;margin:0 0 14px}.style-preview{height:170px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:radial-gradient(circle at 30% 20%,rgba(214,40,40,.22),transparent 38%),linear-gradient(135deg,#191316,#0c090a);display:grid;place-items:center;font-size:54px}.quote-box{border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;background:rgba(255,255,255,.025)}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.date-wrap{display:grid;grid-template-columns:1fr auto;gap:8px}.date-wrap .form-input{min-width:0}.calendar-btn{width:52px;border-radius:14px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:#fff;font-size:18px;cursor:pointer}.calendar-btn:hover{border-color:var(--accent);background:rgba(255,255,255,.07)}input[type="date"]::-webkit-calendar-picker-indicator,input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.9;cursor:pointer}.theme-pick{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:14px 0}.theme-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);display:inline-block}
    @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(214,40,40,0)}50%{transform:scale(1.04);box-shadow:0 0 28px rgba(214,40,40,.28)}}
    @media print{@page{size:letter portrait;margin:10mm}body{background:white!important;color:#111!important}.shell,.watermark,.modal{display:none!important}.print-doc{display:block!important;color:#111!important;background:#fff!important;padding:0!important;font-family:Arial,sans-serif;width:100%;max-width:100%;min-height:100vh}.print-doc h1{font-size:18px;text-align:center;margin:10px 0 8px;text-transform:uppercase}.print-doc h2{font-size:12px;text-align:center;margin:0;padding:6px;background:#dbe5f6;border:1px solid #111;text-transform:uppercase}.print-doc p,.print-doc li{font-size:10.5px;line-height:1.25}.print-doc .consent-top{display:grid;grid-template-columns:1.15fr .85fr;gap:0;background:#dbe5f6;border:1px solid #111;margin-bottom:12px}.print-doc .consent-top>div{padding:8px}.print-doc .consent-logo{display:grid;place-items:center;text-align:center;font-weight:bold}.print-doc .consent-block{border:1px solid #111;margin-top:-1px;padding:6px}.print-doc .consent-grid{display:grid;grid-template-columns:1fr 120px;gap:8px}.print-doc .consent-line{display:inline-block;border-bottom:1px solid #111;min-width:140px;padding:0 4px}.print-doc ul{margin:6px 0 6px 18px;padding:0}.print-doc .small-note{font-size:8.5px;line-height:1.2}.print-doc .firmas{display:grid;grid-template-columns:1fr 1fr;gap:50px;margin-top:38px}.print-doc .line{border-top:1px solid #111;text-align:center;padding-top:7px;font-size:11px}.print-doc .page-break{break-before:page;page-break-before:always}}
    .print-doc{display:none}
    @media (max-width:1100px){.shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.kpis,.grid-2,.grid-3,.form-row{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}}
    @media (max-width:768px){body{padding-bottom:104px;overflow-x:hidden}.watermark{display:none}.shell{display:block}.content{padding:92px 12px 18px}.sidebar{position:fixed;top:0;left:0;right:0;height:76px;z-index:30;padding:10px 12px;background:rgba(9,7,8,.92);backdrop-filter:blur(16px);border-right:0;border-bottom:1px solid var(--border)}.logo-wrap{margin:0}.logo-mark{width:46px;height:46px;border-radius:14px}.logo-wrap .display{font-size:23px!important}.logo-wrap .tiny{font-size:11px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nav{position:fixed;left:8px;right:8px;bottom:8px;z-index:40;display:flex;gap:8px;padding:8px;background:rgba(15,13,14,.96);border:1px solid var(--border);border-radius:24px;box-shadow:0 18px 60px rgba(0,0,0,.42);backdrop-filter:blur(18px);overflow-x:auto;-webkit-overflow-scrolling:touch}.nav button{margin:0;min-width:88px;height:58px;padding:7px 6px;border-radius:16px;justify-content:center;text-align:center;font-size:11px;flex-direction:column;gap:3px;color:#d8d2d5}.nav button.active,.nav button:hover{transform:none;background:rgba(214,40,40,.22);border-color:rgba(214,40,40,.28)}.topbar{margin-bottom:14px;gap:12px}.main-title,#mainTitle{font-size:31px!important;line-height:.95!important;word-break:break-word}.badge{font-size:10px;padding:7px 10px;letter-spacing:.08em}.top-actions{width:100%;display:grid!important;grid-template-columns:1fr 1fr;gap:8px}.hero{padding:18px;border-radius:22px}.kpis{grid-template-columns:1fr 1fr!important;gap:10px;margin:16px 0}.kpis .card{padding:14px;border-radius:18px}.kpis .display{font-size:25px!important}.grid-2,.grid-3{grid-template-columns:1fr!important;gap:12px}.card{padding:16px;border-radius:20px;overflow:hidden}.card:hover{transform:none}.section-title{font-size:28px}.appt{align-items:flex-start;flex-direction:column}.modal{padding:10px;align-items:flex-end}.modal-box{width:100%;max-height:88vh;border-radius:22px 22px 0 0;padding:18px}.form-row{grid-template-columns:1fr!important}.form-input{font-size:16px}.toolbar{display:grid;grid-template-columns:1fr;gap:8px}.table{min-width:680px;font-size:13px}.client-grid{grid-template-columns:1fr}.notice{font-size:12px;word-break:break-all}}
  </style>
</head>
<body>
<div class="watermark" id="watermark"></div><div id="printArea" class="print-doc"></div>
<div class="shell">
  <aside class="sidebar"><div class="logo-wrap"><div class="logo-mark">⚡</div><div><div class="display" style="font-size:30px;line-height:1">InkStudio Pro</div><div class="muted tiny" id="sidebarStudio">Sistema comercial para estudios tattoo</div></div></div>
    <nav class="nav">
      <button class="active" data-view="dashboard">⚡ Dashboard</button><button data-view="agenda">🗓️ Agenda</button><button data-view="clientes">👤 Clientes</button><button data-view="disenos">🎨 Diseños</button><button data-view="ventas">💸 Ventas</button><button data-view="consentimiento">📝 Consentimiento</button><button data-view="cotizador">🧮 Cotizador</button><button data-view="artistas">🧑‍🎨 Artistas</button><button data-view="marketing">📣 Marketing</button><button data-view="config">⚙️ Configuración</button>
    </nav></aside>
  <main class="content"><div class="topbar"><div><span class="badge" id="licenseBadge">licencia activa</span><h1 class="display main-title" id="mainTitle">InkStudio Pro</h1><p class="muted" style="max-width:78ch" id="subtitle"></p></div><div class="top-actions"><button class="btn btn-primary" onclick="openModal('nueva-cita')">Nueva cita</button><button class="btn btn-ghost" onclick="openModal('nuevo-cliente')">Nuevo cliente</button></div></div>
    <section class="hero section active" id="view-dashboard"></section><section class="section" id="view-agenda"></section><section class="section" id="view-clientes"></section><section class="section" id="view-disenos"></section><section class="section" id="view-ventas"></section><section class="section" id="view-consentimiento"></section><section class="section" id="view-cotizador"></section><section class="section" id="view-artistas"></section><section class="section" id="view-marketing"></section><section class="section" id="view-config"></section>
  </main></div>
<div class="modal" id="modal"><div class="modal-box"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2 class="display" id="modalTitle" style="font-size:30px;margin:0"></h2><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div><div id="modalBody" style="margin-top:16px"></div></div></div>
<script>
const DEMO_MODE=true;
const params=new URLSearchParams(location.search);const studio=(params.get('studio')||params.get('estudio')||(DEMO_MODE?'Demo Tattoo Studio':'Mi Estudio')).replace(/[-_]/g,' ').trim();const lic=(params.get('lic')||params.get('licencia')||(DEMO_MODE?'DEMO-INK':'INK-000')).trim();
const safe=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));const money=n=>Number(n||0).toLocaleString('es-MX',{style:'currency',currency:'MXN'});const todayISO=()=>new Date().toISOString().slice(0,10);const storageKey=`inkstudio_pro_${studio}_${lic}`.replace(/\s+/g,'_').toLowerCase();
const initialState={citas:[],clientes:[],ventas:[],artistas:[],mensajes:[],cotizaciones:[],consentimientos:[],theme:'rojo'};let state=DEMO_MODE?demoState():loadState();migrateState();
function demoState(){
  const now=new Date();
  const iso=(d,h)=>{const x=new Date(now);x.setDate(now.getDate()+d);x.setHours(h,0,0,0);return x.toISOString().slice(0,16)}
  return {
    theme:'rojo',
    clientes:[
      {id:'demo_cli_1',nombre:'Juan Pérez',whatsapp:'5512345678',instagram:'@juanperez.tattoo',facebook:'Juan Pérez Tattoo',notas:'Cliente frecuente. Le gustan piezas blackwork y sombras fuertes.'},
      {id:'demo_cli_2',nombre:'María López',whatsapp:'5598765432',instagram:'@maria.tattoo',facebook:'María López',notas:'Pidió diseño floral en antebrazo. Prefiere mensajes por WhatsApp.'},
      {id:'demo_cli_3',nombre:'Carlos Ramírez',whatsapp:'5544332211',instagram:'@carlosink',facebook:'Carlos Ink',notas:'Pendiente confirmar anticipo.'},
      {id:'demo_cli_4',nombre:'Ana Torres',whatsapp:'5522113344',instagram:'@anatorres',facebook:'Ana Torres',notas:'Busca cotización para lettering pequeño.'}
    ],
    citas:[
      {id:'demo_cita_1',cliente:'Juan Pérez',fecha:iso(0,12),servicio:'Tatuaje brazo · Blackwork',artista:'Ramsay',costoTotal:4500,anticipo:1000},
      {id:'demo_cita_2',cliente:'María López',fecha:iso(0,15),servicio:'Tatuaje espalda · Fine line',artista:'Kbrito',costoTotal:3800,anticipo:800},
      {id:'demo_cita_3',cliente:'Carlos Ramírez',fecha:iso(1,17),servicio:'Tatuaje pecho · Tradicional',artista:'Ramsay',costoTotal:5200,anticipo:500}
    ],
    ventas:[
      {id:'demo_venta_1',concepto:'Anticipo · Juan Pérez',tipo:'Anticipo',monto:1000,fecha:todayISO()},
      {id:'demo_venta_2',concepto:'Sesión · María López',tipo:'Sesión',monto:3000,fecha:todayISO()},
      {id:'demo_venta_3',concepto:'Aftercare',tipo:'Producto',monto:350,fecha:todayISO()}
    ],
    artistas:[
      {id:'demo_art_1',nombre:'Ramsay',especialidad:'Blackwork / Tradicional',contacto:'@ramsaytattoo',notas:'Disponible tardes.'},
      {id:'demo_art_2',nombre:'Kbrito',especialidad:'Fine line / Lettering',contacto:'@kbrito.tattoo',notas:'Disponible fines de semana.'}
    ],
    mensajes:[
      {id:'demo_msg_1',nombre:'Recordatorio de cita',objetivo:'Confirmar asistencia',texto:'Hola, te recordamos tu cita en el estudio. Responde CONFIRMO para apartar tu espacio.'},
      {id:'demo_msg_2',nombre:'Anticipo pendiente',objetivo:'Solicitar anticipo',texto:'Hola, para confirmar tu cita necesitamos registrar tu anticipo. Gracias.'}
    ],
    cotizaciones:[],
    consentimientos:[]
  }
}
const estilos=[['Tradicional','Tigre tradicional, líneas gruesas y alto contraste.','🐯'],['Blackwork','Composición negra ornamental.','⚫'],['Fine line','Trazo fino botánico.','🌿'],['Lettering','Tipografía script para frases y nombres.','✍️'],['Minimalista','Símbolo pequeño, limpio y discreto.','◇'],['Realismo','Retrato y sombra en escala de grises.','👁️']];
function loadState(){try{const raw=localStorage.getItem(storageKey);return raw?{...initialState,...JSON.parse(raw)}:{...initialState};}catch(e){return {...initialState};}}
function migrateState(){state={...initialState,...state};state.theme=state.theme||'rojo';state.clientes=state.clientes.map(c=>({facebook:'',...c}));state.citas=state.citas.map(c=>({costoTotal:Number(c.costoTotal||c.costo_total||0),anticipo:Number(c.anticipo||0),...c}));}
function saveState(){if(!DEMO_MODE){localStorage.setItem(storageKey,JSON.stringify(state));}render();}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function applyTheme(){document.body.className=document.body.className.replace(/theme-\w+/g,'').trim();document.body.classList.add('theme-'+(state.theme||'rojo'));}
function setTheme(t){state.theme=t;applyTheme();localStorage.setItem(storageKey,JSON.stringify(state));render();}
function setIdentity(){applyTheme();document.title=`InkStudio Pro Demo | ${studio}`;mainTitle.textContent=`InkStudio Pro · ${studio}`;sidebarStudio.textContent=DEMO_MODE?`Demo pública · sin guardar datos`:`Licencia de ${studio}`;subtitle.textContent=DEMO_MODE?`Demo interactiva: agenda, clientes, cotizaciones, consentimiento, ventas, artistas y marketing. Los cambios de prueba no se guardan.`:`Sistema personalizado para ${studio}: agenda, clientes, cotizaciones, consentimiento, ventas, artistas y marketing.`;licenseBadge.textContent=DEMO_MODE?`demo pública · datos de ejemplo`:`licencia activa · ${lic}`;watermark.textContent=`${studio} · ${lic}`;}
function emptyState(title,copy,action,type){return `<div class="empty-state"><b>${title}</b><p style="margin:8px 0 14px">${copy}</p>${action?`<button class="btn btn-primary" onclick="openModal('${type}')">${action}</button>`:''}</div>`}
function fmt(v){if(!v)return '';const d=new Date(v);return Number.isNaN(d.getTime())?v:d.toLocaleString('es-MX',{dateStyle:'medium',timeStyle:String(v).includes('T')?'short':undefined});}
function cleanPhone(n){return String(n||'').replace(/\D/g,'')}function waLink(n){const x=cleanPhone(n);return x?`https://wa.me/${x.length===10?'52'+x:x}`:'#'}function findClient(name){return state.clientes.find(c=>c.nombre===name)||state.clientes.find(c=>String(c.nombre).toLowerCase()===String(name).toLowerCase())||null}
function dashboard(){const hoy=state.citas.filter(c=>(c.fecha||'').slice(0,10)===todayISO()).length;const ingresos=state.ventas.filter(v=>(v.fecha||'').slice(0,10)===todayISO()).reduce((a,v)=>a+Number(v.monto||0),0);const porCobrar=state.citas.reduce((a,c)=>a+Math.max(0,Number(c.costoTotal||0)-Number(c.anticipo||0)),0);return `<div><span class="badge">panel principal</span><h2 class="display" style="font-size:44px;margin:12px 0">${safe(studio)}</h2><p class="muted">Demo actualizada: agenda rápida, clientes editables, WhatsApp, tarjetas, consentimiento, cotizador y temas visuales.</p></div><div class="kpis"><div class="card"><div class="muted tiny">Citas de hoy</div><div class="display" style="font-size:36px">${hoy}</div></div><div class="card"><div class="muted tiny">Ingresos del día</div><div class="display" style="font-size:36px">${money(ingresos)}</div></div><div class="card"><div class="muted tiny">Saldo por cobrar</div><div class="display" style="font-size:36px">${money(porCobrar)}</div></div><div class="card"><div class="muted tiny">Clientes registrados</div><div class="display" style="font-size:36px">${state.clientes.length}</div></div></div><div class="grid-2"><div class="card"><h3 class="display">Agenda rápida</h3>${apptList(5)}</div><div class="card"><h3 class="display">Clientes recientes</h3>${clientCards(4)}</div></div>`}
function apptList(limit){if(!state.citas.length)return emptyState('Sin citas todavía','Cuando registres una cita aparecerá aquí.','Nueva cita','nueva-cita');return `<div class="list">${state.citas.slice().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||'')).slice(0,limit||999).map(c=>{const cli=findClient(c.cliente);const saldo=Math.max(0,Number(c.costoTotal||0)-Number(c.anticipo||0));return `<div class="appt"><div><b>${safe(c.cliente)}</b><div class="muted tiny">${safe(fmt(c.fecha))} · ${safe(c.servicio)}</div><div class="muted tiny">Total ${money(c.costoTotal)} · Anticipo ${money(c.anticipo)} · Saldo ${money(saldo)}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">${cli&&cli.whatsapp?`<a class="btn btn-ghost btn-small" target="_blank" href="${waLink(cli.whatsapp)}">WhatsApp</a>`:''}<button class="btn btn-ghost btn-small" onclick="openModal('editar-cita','${c.id}')">Editar</button><button class="btn btn-ghost btn-small" onclick="deleteItem('citas','${c.id}')">Eliminar</button></div></div>`}).join('')}</div>`}
function clientCards(limit){if(!state.clientes.length)return emptyState('Sin clientes','Registra clientes para ver sus tarjetas y abrir su detalle.','Nuevo cliente','nuevo-cliente');return `<div class="client-grid">${state.clientes.slice(-1*(limit||999)).reverse().map(c=>`<div class="card client-card" onclick="openClient('${c.id}')"><div style="display:flex;justify-content:space-between;gap:10px"><div><b>${safe(c.nombre)}</b><div class="muted tiny">${safe(c.whatsapp||'Sin WhatsApp')}</div></div><span class="pill">Ver</span></div><div class="toolbar" onclick="event.stopPropagation()">${c.whatsapp?`<a class="btn btn-ghost btn-small" target="_blank" href="${waLink(c.whatsapp)}">WhatsApp</a>`:''}<button class="btn btn-ghost btn-small" onclick="openModal('editar-cliente','${c.id}')">Editar</button></div></div>`).join('')}</div>`}
function table(headers,rows,kind){if(!rows.length)return emptyState('Sin registros','La información aparecerá aquí cuando empieces a capturar datos.','','');return `<div class="table-wrap"><table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th></th></tr></thead><tbody>${rows.map(r=>`<tr>${r.cells.map(c=>`<td>${c}</td>`).join('')}<td>${kind==='clientes'?`<button class="btn btn-ghost btn-small" onclick="openClient('${r.id}')">Ver</button> <button class="btn btn-ghost btn-small" onclick="openModal('editar-cliente','${r.id}')">Editar</button>`:`<button class="btn btn-ghost btn-small" onclick="deleteItem('${kind}','${r.id}')">Eliminar</button>`}</td></tr>`).join('')}</tbody></table></div>`}
function ventasList(limit){if(!state.ventas.length)return emptyState('Sin ventas registradas','Aquí aparecerán anticipos, sesiones pagadas y pendientes de cobro.','Registrar venta','nueva-venta');return `<div class="list">${state.ventas.slice().sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,limit||999).map(v=>`<div class="appt"><div><b>${safe(v.concepto)}</b><div class="muted tiny">${safe(v.tipo)} · ${safe(fmt(v.fecha))}</div></div><div><span class="pill">${money(v.monto)}</span> <button class="btn btn-ghost btn-small" onclick="deleteItem('ventas','${v.id}')">Eliminar</button></div></div>`).join('')}</div>`}
function render(){document.getElementById('view-dashboard').innerHTML=dashboard();document.getElementById('view-agenda').innerHTML=`<div class="card"><h2 class="display section-title">Agenda</h2>${apptList()}<br>${state.citas.length?`<button class="btn btn-primary" onclick="openModal('nueva-cita')">Agregar cita</button>`:''}</div>`;document.getElementById('view-clientes').innerHTML=`<div class="card"><h2 class="display section-title">Clientes</h2>${clientCards()}<br><button class="btn btn-primary" onclick="openModal('nuevo-cliente')">Nuevo cliente</button></div>`;document.getElementById('view-disenos').innerHTML=`<div class="grid-3">${estilos.map(d=>`<div class="card"><div class="style-preview">${d[2]}</div><h3 class="display">${d[0]}</h3><p class="muted tiny">${d[1]}</p></div>`).join('')}</div>`;document.getElementById('view-ventas').innerHTML=`<div class="card"><h2 class="display section-title">Ventas y anticipos</h2>${ventasList()}<br>${state.ventas.length?`<button class="btn btn-primary" onclick="openModal('nueva-venta')">Registrar venta</button>`:''}</div>`;document.getElementById('view-consentimiento').innerHTML=`<div class="card"><h2 class="display section-title">Consentimiento</h2><p class="muted">Genera una hoja limpia lista para imprimir con los datos básicos del cliente y la cita.</p><button class="btn btn-primary" onclick="openModal('consentimiento')">Generar consentimiento</button></div>`;document.getElementById('view-cotizador').innerHTML=`<div class="card"><h2 class="display section-title">Cotizador</h2><div class="quote-box"><p class="muted">Cotización rápida opcional. Calcula un precio sugerido por horas, complejidad y materiales.</p><button class="btn btn-primary" onclick="openModal('cotizador')">Abrir cotizador</button></div></div>`;document.getElementById('view-artistas').innerHTML=`<div class="card"><h2 class="display section-title">Artistas</h2>${table(['Artista','Especialidad','Contacto','Notas'],state.artistas.map(a=>({id:a.id,cells:[safe(a.nombre),safe(a.especialidad),safe(a.contacto),safe(a.notas)]})),'artistas')}<br><button class="btn btn-primary" onclick="openModal('nuevo-artista')">Agregar artista</button></div>`;document.getElementById('view-marketing').innerHTML=`<div class="grid-2"><div class="card"><h2 class="display section-title">Marketing</h2><button class="btn btn-primary" onclick="openModal('mensaje')">Crear plantilla</button></div><div class="card"><h3 class="display">Plantillas</h3>${table(['Nombre','Objetivo','Mensaje'],state.mensajes.map(m=>({id:m.id,cells:[safe(m.nombre),safe(m.objetivo),safe(m.texto)]})),'mensajes')}</div></div>`;document.getElementById('view-config').innerHTML=`<div class="card"><h2 class="display section-title">Configuración</h2><div class="ok">Demo pública actualizada. Puedes probar el sistema con datos de ejemplo; los cambios no se guardan al cerrar o recargar.</div><br><h3 class="display">Tema visual</h3><div class="theme-pick">${['rojo','morado','azul','verde','dorado'].map(t=>`<button class="btn ${state.theme===t?'btn-primary':'btn-ghost'}" onclick="setTheme('${t}')"><span class="theme-dot"></span>${t}</button>`).join('')}</div><div class="notice">Liga sugerida:<br><b>${location.origin}${location.pathname}?studio=${encodeURIComponent(studio)}&lic=${encodeURIComponent(lic)}</b></div><div class="toolbar"><button class="btn btn-ghost" onclick="exportBackup()">Exportar respaldo JSON</button><label class="btn btn-ghost">Importar respaldo<input type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></label><button class="btn btn-ghost" onclick="resetData()">Borrar datos</button></div></div>`;}
function clientOptions(){return `<datalist id="clientList">${state.clientes.map(c=>`<option value="${safe(c.nombre)}">${safe(c.whatsapp||'')}</option>`).join('')}</datalist>`}
function modalForm(fields,button,handler,obj={}){return `${clientOptions()}<form onsubmit="${handler}(event)"><div class="form-row">${fields.map(f=>{const val=safe(obj[f.name]??''); const req=f.required?'required':''; if(f.type==='textarea')return `<div class="field"><label>${f.label}</label><textarea class="form-input" rows="5" name="${f.name}" placeholder="${f.label}" ${req}>${val}</textarea></div>`; if(f.type==='select')return `<div class="field"><label>${f.label}</label><select class="form-input" name="${f.name}" ${req}>${f.options.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></div>`; const inputId='fld_'+f.name+'_'+Math.random().toString(36).slice(2,7); const input=`<input id="${inputId}" class="form-input" name="${f.name}" type="${f.type||'text'}" ${f.list?`list="${f.list}"`:''} placeholder="${f.label}" value="${val}" ${req}>`; if(f.type==='date'||f.type==='datetime-local')return `<div class="field"><label>${f.label}</label><div class="date-wrap">${input}<button class="calendar-btn" type="button" title="Abrir calendario" onclick="openDatePicker('${inputId}')">📅</button></div></div>`; return `<div class="field"><label>${f.label}</label>${input}</div>`}).join('')}</div><br><button class="btn btn-primary" type="submit">${button}</button></form>`}
function openDatePicker(id){const el=document.getElementById(id);if(!el)return;try{if(el.showPicker)el.showPicker();else el.focus();}catch(e){el.focus();el.click();}}
function citaFields(){return [{name:'cliente',label:'Cliente: escribe o elige de la lista',list:'clientList',required:true},{name:'fecha',label:'Fecha y hora',type:'datetime-local',required:true},{name:'servicio',label:'Servicio / estilo',required:true},{name:'artista',label:'Artista asignado'},{name:'costoTotal',label:'Costo total del tattoo',type:'number'},{name:'anticipo',label:'Anticipo',type:'number'}]}
function clienteFields(){return [{name:'nombre',label:'Nombre',required:true},{name:'whatsapp',label:'WhatsApp'},{name:'instagram',label:'Instagram'},{name:'facebook',label:'Facebook'},{name:'notas',label:'Notas',type:'textarea'}]}
function openModal(type,id){modalTitle.textContent='';modalBody.innerHTML=''; if(type==='nueva-cita'){modalTitle.textContent='Nueva cita';modalBody.innerHTML=modalForm(citaFields(),'Guardar cita','saveCita')}else if(type==='editar-cita'){let x=state.citas.find(i=>i.id===id);modalTitle.textContent='Editar cita';modalBody.innerHTML=modalForm(citaFields(),'Guardar cambios',`updateCita_${id}`,x);window[`updateCita_${id}`]=e=>updateItem(e,'citas',id,['anticipo','costoTotal']);}else if(type==='nuevo-cliente'){modalTitle.textContent='Nuevo cliente';modalBody.innerHTML=modalForm(clienteFields(),'Guardar cliente','saveCliente')}else if(type==='editar-cliente'){let x=state.clientes.find(i=>i.id===id);modalTitle.textContent='Editar cliente';modalBody.innerHTML=modalForm(clienteFields(),'Guardar cambios',`updateCliente_${id}`,x);window[`updateCliente_${id}`]=e=>updateItem(e,'clientes',id,[]);}else if(type==='nuevo-artista'){modalTitle.textContent='Nuevo artista';modalBody.innerHTML=modalForm([{name:'nombre',label:'Nombre artístico',required:true},{name:'especialidad',label:'Especialidad'},{name:'contacto',label:'Instagram / contacto'},{name:'notas',label:'Notas'}],'Guardar artista','saveArtista')}else if(type==='nueva-venta'){modalTitle.textContent='Registrar venta';modalBody.innerHTML=modalForm([{name:'concepto',label:'Concepto',required:true},{name:'tipo',label:'Tipo: Anticipo / Sesión / Producto',required:true},{name:'monto',label:'Monto',type:'number',required:true},{name:'fecha',label:'Fecha',type:'date'}],'Guardar venta','saveVenta')}else if(type==='consentimiento'){modalTitle.textContent='Consentimiento';modalBody.innerHTML=modalForm([{name:'cliente',label:'Cliente',list:'clientList',required:true},{name:'edad',label:'Edad',type:'number'},{name:'telefono',label:'Teléfono / WhatsApp'},{name:'identificacion',label:'INE / identificación'},{name:'tutor',label:'Tutor legal, si aplica'},{name:'zona',label:'Zona del cuerpo / descripción',required:true},{name:'artista',label:'Aplicador/a o artista'},{name:'prueba',label:'Prueba sensibilidad',type:'select',options:['No aplica','Sí','No']},{name:'tintas',label:'Tintas / lote / color',type:'textarea'},{name:'fecha',label:'Fecha',type:'date'}],'Generar para imprimir','generateConsent')}else if(type==='cotizador'){modalTitle.textContent='Cotizador';modalBody.innerHTML=modalForm([{name:'cliente',label:'Cliente',list:'clientList'},{name:'horas',label:'Horas estimadas',type:'number'},{name:'tarifa',label:'Tarifa por hora',type:'number'},{name:'materiales',label:'Materiales / insumos',type:'number'},{name:'complejidad',label:'Complejidad',type:'select',options:['Baja','Media','Alta']},{name:'anticipo',label:'Anticipo sugerido',type:'number'}],'Calcular cotización','calcQuote')}else{modalTitle.textContent='Plantilla de marketing';modalBody.innerHTML=modalForm([{name:'nombre',label:'Nombre de la plantilla',required:true},{name:'objetivo',label:'Objetivo'},{name:'texto',label:'Escribe aquí tu mensaje',type:'textarea',required:true}],'Guardar plantilla','saveMensaje')}modal.classList.add('active')}
function closeModal(){modal.classList.remove('active')}function fd(form){return Object.fromEntries(new FormData(form).entries())}
function saveCita(e){e.preventDefault();const x=fd(e.target);state.citas.push({id:uid(),...x,anticipo:Number(x.anticipo||0),costoTotal:Number(x.costoTotal||0)});if(Number(x.anticipo||0)>0)state.ventas.push({id:uid(),concepto:`Anticipo · ${x.cliente}`,tipo:'Anticipo',monto:Number(x.anticipo),fecha:(x.fecha||todayISO()).slice(0,10)});saveState();closeModal()}
function updateItem(e,kind,id,nums){e.preventDefault();const x=fd(e.target);nums.forEach(n=>x[n]=Number(x[n]||0));state[kind]=state[kind].map(i=>i.id===id?{...i,...x}:i);saveState();closeModal()}
function saveCliente(e){e.preventDefault();state.clientes.push({id:uid(),facebook:'',...fd(e.target)});saveState();closeModal()}function saveArtista(e){e.preventDefault();state.artistas.push({id:uid(),...fd(e.target)});saveState();closeModal()}function saveVenta(e){e.preventDefault();const x=fd(e.target);state.ventas.push({id:uid(),...x,monto:Number(x.monto||0),fecha:x.fecha||todayISO()});saveState();closeModal()}function saveMensaje(e){e.preventDefault();state.mensajes.push({id:uid(),...fd(e.target)});saveState();closeModal()}
function openClient(id){const c=state.clientes.find(x=>x.id===id);if(!c)return;const citas=state.citas.filter(x=>x.cliente===c.nombre);modalTitle.textContent=c.nombre;modalBody.innerHTML=`<div class="grid-2"><div class="card"><h3 class="display">Datos</h3><p>WhatsApp: ${safe(c.whatsapp||'')}</p><p>Instagram: ${safe(c.instagram||'')}</p><p>Facebook: ${safe(c.facebook||'')}</p><p class="muted">${safe(c.notas||'Sin notas')}</p><div class="toolbar">${c.whatsapp?`<a class="btn btn-primary" target="_blank" href="${waLink(c.whatsapp)}">Abrir WhatsApp</a>`:''}<button class="btn btn-ghost" onclick="openModal('editar-cliente','${c.id}')">Editar contacto</button></div></div><div class="card"><h3 class="display">Historial</h3>${citas.length?citas.map(x=>`<div class="appt"><div><b>${safe(x.servicio)}</b><div class="muted tiny">${fmt(x.fecha)}</div><div class="muted tiny">Total ${money(x.costoTotal)} · Saldo ${money(Math.max(0,Number(x.costoTotal||0)-Number(x.anticipo||0)))}</div></div></div>`).join(''):emptyState('Sin historial','Aún no hay citas para este cliente.','','')}</div></div>`;modal.classList.add('active')}
function generateConsent(e){
  e.preventDefault();
  const x=fd(e.target);
  const fecha=x.fecha||todayISO();
  const c=state.clientes.find(cl=>(cl.nombre||'').toLowerCase()===(x.cliente||'').toLowerCase());
  const tel=x.telefono||c?.whatsapp||'';
  const d=new Date(fecha+'T00:00:00');
  const fechaTexto=Number.isNaN(d.getTime())?fecha:d.toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
  const ciudad='________________';
  printArea.innerHTML=`
  <div class="consent-top">
    <div><b>DATOS DE LA EMPRESA:</b><br>Estudio: ${safe(studio)}<br>Dirección: ________________________________<br>Teléfono: ________________________________<br>Responsable: ________________________________</div>
    <div class="consent-logo">LOGOTIPO DEL ESTUDIO<br><span style="font-weight:normal">Opcional</span></div>
  </div>
  <h1>Modelo de consentimiento informado para tatuaje</h1>
  <div class="consent-block"><b>DATOS DEL CLIENTE</b><br>
    <div class="consent-grid"><div>Nombre: <span class="consent-line">${safe(x.cliente)}</span></div><div>Edad: <span class="consent-line">${safe(x.edad||'____')}</span></div></div>
    Identificación: <span class="consent-line">${safe(x.identificacion||'________________')}</span> &nbsp; Teléfono: <span class="consent-line">${safe(tel||'________________')}</span>
  </div>
  <div class="consent-block"><b>EN CASO DE MENORES DE EDAD O PERSONAS QUE REQUIERAN TUTOR/A</b><br>
    Nombre del tutor legal: <span class="consent-line">${safe(x.tutor||'________________________________')}</span> &nbsp; Teléfono: <span class="consent-line">________________</span>
  </div>
  <h2>Descripción de la técnica</h2>
  <div class="consent-block"><p>El tatuaje es una técnica invasiva de carácter <b>permanente</b> en la que las tintas se introducen en la piel mediante agujas. Esto implica posibles riesgos de irritación, infección, sangrado, inflamación, reacción alérgica, cicatrización anormal y exposición a sustancias químicas de las tintas.</p></div>
  <h2>Riesgos y complicaciones que se pueden derivar</h2>
  <div class="consent-block"><p>El cliente declara haber sido informado de que pueden presentarse molestias, enrojecimiento, inflamación, infección, alergias, cambios de color, mala cicatrización, queloides o necesidad de atención médica. También se informa que durante un periodo posterior al tatuaje puede no ser recomendable donar sangre y que un tatuaje reciente puede interferir con ciertos procedimientos médicos.</p></div>
  <h2>Indicaciones previas a la aplicación del tatuaje</h2>
  <div class="consent-block"><ul><li>Informar si toma medicamentos, especialmente anticoagulantes, vasodilatadores o tratamientos médicos relevantes.</li><li>No consumir alcohol, drogas o sustancias estimulantes antes del procedimiento.</li><li>No exponerse al sol o rayos UV en la zona a tatuar.</li><li>Informar alergias, enfermedades de la piel, embarazo, lactancia o cualquier condición de salud relevante.</li></ul></div>
  <h2>Cuidados generales posteriores</h2>
  <div class="consent-block"><ul><li>Lavar suavemente la zona con agua y jabón neutro, siguiendo las indicaciones del estudio.</li><li>Mantener la zona seca y limpia; evitar albercas, playa, sauna, polvo y sudor excesivo durante la cicatrización.</li><li>No rascar, frotar ni retirar costras.</li><li>Evitar sol directo y rayos UV; usar protección solar una vez cicatrizado.</li><li>Consultar a un médico si aparece dolor intenso, secreción, fiebre, inflamación grave o cualquier complicación.</li></ul></div>
  <div class="page-break"></div>
  <h2>Contraindicaciones</h2>
  <div class="consent-block"><p>No deberá realizarse el tatuaje si el cliente presenta alergias conocidas a productos utilizados, hemofilia, infecciones activas, lesiones en la zona, psoriasis, urticaria, queloides, verrugas, lunares sospechosos, melanoma, cáncer de piel u otra condición que pueda poner en riesgo su salud. En caso de duda, deberá consultar previamente con su médico.</p></div>

  setTimeout(()=>window.print(),120);
}
function calcQuote(e){e.preventDefault();const x=fd(e.target);const mult=x.complejidad==='Alta'?1.35:x.complejidad==='Media'?1.15:1;const total=Math.round(((Number(x.horas||0)*Number(x.tarifa||0))*mult)+Number(x.materiales||0));const saldo=Math.max(0,total-Number(x.anticipo||0));modalBody.innerHTML+=`<div class="quote-box" style="margin-top:16px"><h3 class="display">Resultado</h3><p>Total sugerido: <b>${money(total)}</b></p><p>Anticipo: <b>${money(x.anticipo)}</b></p><p>Saldo: <b>${money(saldo)}</b></p><button class="btn btn-primary" onclick='saveQuote(${JSON.stringify({...x,total,saldo}).replace(/'/g,"&#39;")})'>Guardar cotización</button></div>`}
function saveQuote(q){state.cotizaciones.push({id:uid(),fecha:todayISO(),...q});saveState();alert('Cotización guardada.');}
function deleteItem(kind,id){if(kind==='noop')return;if(!confirm('¿Eliminar este registro?'))return;state[kind]=state[kind].filter(x=>x.id!==id);saveState()}
function exportBackup(){const blob=new Blob([JSON.stringify({studio,lic,state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`InkStudio_${studio.replace(/\s+/g,'_')}_respaldo.json`;a.click();URL.revokeObjectURL(a.href)}function importBackup(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);state={...initialState,...(data.state||data)};migrateState();saveState();alert('Respaldo importado correctamente.')}catch(e){alert('No se pudo importar el archivo.')}};reader.readAsText(file)}function resetData(){if(DEMO_MODE){state=demoState();migrateState();saveState();alert('Demo reiniciada con datos de ejemplo.');return;}if(!confirm('Esto borrará los datos guardados en este navegador. ¿Continuar?'))return;state={...initialState};saveState()}
document.querySelectorAll('.nav button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('view-'+btn.dataset.view).classList.add('active')}));setIdentity();render();
</script>
