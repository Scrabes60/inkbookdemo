<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkStudio Pro Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg:#090708;--surface:#121013;--surface2:#181519;--border:rgba(255,255,255,.08);--text:#f5f2f3;--muted:#a7a0a4;--accent:#d62828;--accent2:#7f1d1d;--gold:#f0b35a;--good:#22c55e;--warn:#f59e0b;--shadow:0 24px 80px rgba(214,40,40,.18)}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#2b1015 0%,#100d10 28%,#090708 68%,#060506 100%);color:var(--text)}
    .display{font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;letter-spacing:.06em;text-transform:uppercase}.shell{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.sidebar{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));border-right:1px solid var(--border);padding:24px;position:sticky;top:0;height:100vh}.logo-wrap{display:flex;gap:14px;align-items:center;margin-bottom:28px}.logo-mark{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#ff4d4d 0%,#d62828 45%,#541111 100%);display:grid;place-items:center;box-shadow:var(--shadow);animation:pulse 3.5s ease-in-out infinite}.nav button{width:100%;display:flex;gap:12px;align-items:center;padding:14px 16px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:16px;margin-bottom:8px;transition:.2s;text-align:left}.nav button:hover,.nav button.active{background:linear-gradient(90deg,rgba(214,40,40,.18),rgba(214,40,40,.04));border-color:rgba(214,40,40,.22);color:#fff;transform:translateX(3px)}
    .content{padding:28px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(214,40,40,.12),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:28px;padding:34px;box-shadow:var(--shadow)}.hero:before{content:'';position:absolute;inset:auto -60px -60px auto;width:220px;height:220px;background:radial-gradient(circle,rgba(214,40,40,.30),transparent 68%);filter:blur(6px)}
    .badge{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid rgba(240,179,90,.24);background:rgba(240,179,90,.08);color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0}.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));border:1px solid var(--border);border-radius:24px;padding:20px;transition:.2s}.card:hover{transform:translateY(-2px);border-color:rgba(214,40,40,.18)}.grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.table{width:100%;border-collapse:collapse}.table td,.table th{padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}.list{display:grid;gap:12px}.appt{display:flex;justify-content:space-between;gap:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.btn{border:none;border-radius:16px;padding:14px 18px;font-weight:700;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,#ff4d4d,#d62828);color:#fff;box-shadow:0 14px 34px rgba(214,40,40,.25)}.btn-ghost{background:rgba(255,255,255,.03);border:1px solid var(--border);color:#fff}.btn-small{padding:8px 10px;border-radius:12px;font-size:12px}.muted{color:var(--muted)} .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}.section{display:none}.section.active{display:block}.tiny{font-size:12px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-input{width:100%;background:#0f0d0e;border:1px solid rgba(255,255,255,.09);color:#fff;padding:12px 14px;border-radius:14px;outline:none}.form-input:focus{border-color:#d62828;box-shadow:0 0 0 3px rgba(214,40,40,.16)}.inkline{height:8px;border-radius:999px;background:linear-gradient(90deg,#ff4d4d,#d62828,#641313);position:relative;overflow:hidden}.inkline:after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:sheen 3.2s linear infinite}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal.active{display:flex}.modal-box{width:min(900px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#151214,#0f0d0e);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:22px}.style-preview{height:170px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:radial-gradient(circle at 30% 20%,rgba(214,40,40,.22),transparent 38%),linear-gradient(135deg,#191316,#0c090a);display:grid;place-items:center;overflow:hidden}.style-preview svg{width:100%;height:100%;opacity:.92}.empty-state{border:1px dashed rgba(255,255,255,.18);border-radius:18px;padding:22px;background:rgba(255,255,255,.025);color:var(--muted)}.progress{height:10px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}.progress > div{height:100%;background:linear-gradient(90deg,#d62828,#ff4d4d)}.notice{border:1px solid rgba(240,179,90,.22);background:rgba(240,179,90,.07);border-radius:18px;padding:14px;color:#f9d7a1}.ok{border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.08);border-radius:18px;padding:14px;color:#bbf7d0}.watermark{position:fixed;right:18px;bottom:14px;color:rgba(255,255,255,.18);font-size:11px;z-index:1;pointer-events:none}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

    .demo-ribbon{position:fixed;top:18px;right:-42px;transform:rotate(35deg);background:linear-gradient(135deg,#f0b35a,#d62828);color:#100d10;font-weight:900;letter-spacing:.12em;text-transform:uppercase;padding:9px 52px;z-index:60;box-shadow:0 12px 30px rgba(0,0,0,.28);font-size:12px}.locked{opacity:.62;cursor:not-allowed!important}.demo-callout{border:1px solid rgba(214,40,40,.28);background:linear-gradient(135deg,rgba(214,40,40,.13),rgba(240,179,90,.06));border-radius:22px;padding:18px}
    @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(214,40,40,0)}50%{transform:scale(1.04);box-shadow:0 0 28px rgba(214,40,40,.28)}} @keyframes sheen{100%{transform:translateX(120%)}}
    @media (max-width:1100px){.shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.kpis,.grid-2,.grid-3,.form-row{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<div class="demo-ribbon">Demo</div>
<div class="watermark" id="watermark"></div>
<div class="shell">
  <aside class="sidebar">
    <div class="logo-wrap"><div class="logo-mark" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 47L30 17L35 28L47 14" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M44 14H50V20" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 49H46" stroke="white" stroke-width="5" stroke-linecap="round"/></svg></div><div><div class="display" style="font-size:30px;line-height:1">InkStudio Pro</div><div class="muted tiny" id="sidebarStudio">Sistema comercial para estudios tattoo</div></div></div>
    <nav class="nav"><button class="active" data-view="dashboard">⚡ Dashboard</button><button data-view="agenda">🗓️ Agenda</button><button data-view="clientes">👤 Clientes</button><button data-view="disenos">🎨 Diseños</button><button data-view="ventas">💸 Ventas</button><button data-view="artistas">🧑‍🎨 Artistas</button><button data-view="marketing">📣 Marketing</button><button data-view="config">⚙️ Configuración</button></nav>
  </aside>
  <main class="content">
    <div class="topbar"><div><span class="badge" id="licenseBadge">licencia activa</span><h1 class="display" style="font-size:54px;margin:10px 0 8px" id="mainTitle">InkStudio Pro</h1><p class="muted" style="max-width:78ch" id="subtitle">Agenda, clientes, diseños, ventas, artistas y marketing para estudios de tatuaje.</p></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" onclick="openModal('nueva-cita')">Probar cita</button><button class="btn btn-ghost" onclick="openModal('nuevo-cliente')">Probar cliente</button></div></div>
    <section class="hero section active" id="view-dashboard"></section><section class="section" id="view-agenda"></section><section class="section" id="view-clientes"></section><section class="section" id="view-disenos"></section><section class="section" id="view-ventas"></section><section class="section" id="view-artistas"></section><section class="section" id="view-marketing"></section><section class="section" id="view-config"></section>
  </main>
</div>
<div class="modal" id="modal"><div class="modal-box"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2 class="display" id="modalTitle" style="font-size:30px;margin:0"></h2><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div><div id="modalBody" style="margin-top:16px"></div></div></div>
<script>
const DEMO_MODE=true;
const params=new URLSearchParams(location.search);
const studio=(params.get('studio')||params.get('estudio')||'Demo Ink Studio').replace(/[-_]/g,' ').trim();
const lic=(params.get('lic')||params.get('licencia')||'DEMO-INK-2026').trim();
const safe=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const money=n=>Number(n||0).toLocaleString('es-MX',{style:'currency',currency:'MXN'});
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
let state={
  citas:[
    {id:'c1',cliente:'Valeria Cruz',fecha:'2026-06-18T12:00',servicio:'Tigre tradicional · Antebrazo',artista:'Raven',anticipo:800},
    {id:'c2',cliente:'Diego Luna',fecha:'2026-06-20T17:30',servicio:'Lettering · Pecho',artista:'Mia Black',anticipo:500},
    {id:'c3',cliente:'Ana Torres',fecha:'2026-06-22T15:00',servicio:'Fine line · Flor minimalista',artista:'Sombra',anticipo:300}
  ],
  clientes:[
    {id:'cl1',nombre:'Valeria Cruz',whatsapp:'55 0000 0001',instagram:'@valeria.ink',notas:'Le gusta tradicional americano. Ya dejó anticipo.'},
    {id:'cl2',nombre:'Diego Luna',whatsapp:'55 0000 0002',instagram:'@diegoluna',notas:'Cotización para lettering grande.'},
    {id:'cl3',nombre:'Ana Torres',whatsapp:'55 0000 0003',instagram:'@anatorres',notas:'Primera cita, diseño pequeño.'}
  ],
  ventas:[
    {id:'v1',concepto:'Anticipo · Valeria Cruz',tipo:'Anticipo',monto:800,fecha:'2026-06-14'},
    {id:'v2',concepto:'Sesión blackwork',tipo:'Sesión',monto:2500,fecha:'2026-06-13'},
    {id:'v3',concepto:'Anticipo · Diego Luna',tipo:'Anticipo',monto:500,fecha:'2026-06-12'}
  ],
  artistas:[
    {id:'a1',nombre:'Raven',especialidad:'Tradicional / Neotradicional',contacto:'@raven.tattoo',notas:'Agenda jueves a domingo.'},
    {id:'a2',nombre:'Mia Black',especialidad:'Lettering / Blackwork',contacto:'@miablack.ink',notas:'Solicita anticipo mínimo de $500.'},
    {id:'a3',nombre:'Sombra',especialidad:'Fine line / Minimalista',contacto:'@sombra.ink',notas:'Ideal para piezas pequeñas.'}
  ],
  mensajes:[
    {id:'m1',nombre:'Confirmación de cita',objetivo:'Recordar asistencia',texto:'Hola, te confirmamos tu cita en '+studio+'. Recuerda llegar 10 minutos antes y traer identificación.'},
    {id:'m2',nombre:'Solicitud de anticipo',objetivo:'Apartar fecha',texto:'Para apartar tu fecha se requiere anticipo. Al recibirlo, tu cita queda confirmada.'},
    {id:'m3',nombre:'Cuidados posteriores',objetivo:'Postventa',texto:'Lava con jabón neutro, hidrata con una capa ligera y evita sol, alberca o rascar la zona.'}
  ]
};
const estilos=[
  {name:'Tradicional',desc:'Tigre tradicional, líneas gruesas y alto contraste.',icon:'tiger'},
  {name:'Neotradicional',desc:'Pantera y flores con volumen, color y sombras marcadas.',icon:'neo'},
  {name:'Blackwork',desc:'Composición negra ornamental.',icon:'blackwork'},
  {name:'Fine line',desc:'Trazo fino botánico.',icon:'fineline'},
  {name:'Realismo',desc:'Rostro con sombreado y detalle.',icon:'realismo'},
  {name:'Japonés',desc:'Koi, olas y composición dinámica.',icon:'japones'},
  {name:'Lettering',desc:'Tipografía ornamental para frases y nombres.',icon:'lettering'},
  {name:'Minimalista',desc:'Símbolos limpios y discretos.',icon:'minimal'}
];
function setIdentity(){
  document.title='InkStudio Pro Demo - '+studio;
  document.getElementById('mainTitle').textContent='InkStudio Pro · Demo';
  document.getElementById('subtitle').textContent='Demo interactiva para conocer agenda, clientes, diseños, ventas, artistas y marketing. No guarda ni importa datos reales.';
  document.getElementById('sidebarStudio').textContent=studio+' · demo sin captura de datos';
  document.getElementById('licenseBadge').textContent='demo sin guardado';
  document.getElementById('watermark').textContent='DEMO · '+studio+' · '+lic;
}
function saveState(){render();showDemoLock('Esta demo no guarda cambios. La versión vendible sí permite capturar, respaldar e importar información.');}
function loadState(){return state;}
function showDemoLock(msg='Función bloqueada en demo.'){alert(msg+'\n\nPara usarla con datos reales se necesita la versión vendible de InkStudio Pro.');}
function kpi(label,value,sub){return `<div class="card"><div class="muted tiny">${label}</div><div class="display" style="font-size:34px;margin:6px 0">${value}</div><div class="muted tiny">${sub}</div></div>`}
function dashboard(){const totalVentas=state.ventas.reduce((a,b)=>a+Number(b.monto||0),0);const anticipos=state.citas.reduce((a,b)=>a+Number(b.anticipo||0),0);return `<div class="demo-callout"><span class="badge">vista previa comercial</span><h2 class="display" style="font-size:44px;margin:10px 0">${safe(studio)}</h2><p class="muted">Explora la experiencia del sistema con datos de muestra. Los botones abren formularios para mostrar el flujo, pero no se guarda información real.</p></div><div class="kpis">${kpi('Ventas registradas',money(totalVentas),'Ejemplo mensual')}${kpi('Citas próximas',state.citas.length,'Agenda de muestra')}${kpi('Clientes',state.clientes.length,'Base demo')}${kpi('Anticipos',money(anticipos),'Apartados de ejemplo')}</div><div class="grid-2"><div class="card"><h3 class="display">Próximas citas</h3>${apptList()}</div><div class="card"><h3 class="display">Resumen del estudio</h3><p class="muted">Licencia demo: <b>${safe(lic)}</b></p><div class="inkline"></div><br><div class="notice">Demo protegida: no escribe en el navegador, no importa respaldos y no permite capturar datos reales.</div></div></div>`}
function apptList(){return `<div class="list">${state.citas.map(c=>`<div class="appt"><div><b>${safe(c.cliente)}</b><div class="muted tiny">${safe(c.servicio)} · ${safe(c.artista||'Sin artista')}</div><div class="tiny">${formatDate(c.fecha)}</div></div><span class="pill">${money(c.anticipo||0)}</span></div>`).join('')}</div>`}
function ventasList(){return `<table class="table"><thead><tr><th>Fecha</th><th>Concepto</th><th>Tipo</th><th>Monto</th></tr></thead><tbody>${state.ventas.map(v=>`<tr><td>${safe(v.fecha)}</td><td>${safe(v.concepto)}</td><td>${safe(v.tipo)}</td><td>${money(v.monto)}</td></tr>`).join('')}</tbody></table>`}
function table(headers,rows,kind){if(!rows.length)return '<div class="empty-state">Sin registros de muestra.</div>';return `<table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th>Acción</th></tr></thead><tbody>${rows.map(r=>`<tr>${r.cells.map(c=>`<td>${c}</td>`).join('')}<td><button class="btn btn-ghost btn-small locked" onclick="showDemoLock('Eliminar registros está bloqueado en la demo.')">Bloqueado</button></td></tr>`).join('')}</tbody></table>`}
function clientesRows(){return state.clientes.map(c=>({id:c.id,cells:[safe(c.nombre),safe(c.whatsapp),safe(c.instagram),safe(c.notas)]}))}
function artistasRows(){return state.artistas.map(a=>({id:a.id,cells:[safe(a.nombre),safe(a.especialidad),safe(a.contacto),safe(a.notas)]}))}
function mensajesRows(){return state.mensajes.map(m=>({id:m.id,cells:[safe(m.nombre),safe(m.objetivo),safe(m.texto)]}))}
function formatDate(value){if(!value)return ''; const d=new Date(value); if(Number.isNaN(d.getTime()))return value; return d.toLocaleString('es-MX',{dateStyle:'medium',timeStyle:value.includes('T')?'short':undefined});}
function styleSvg(kind){const common='fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"';const fill='fill="rgba(214,40,40,.34)" stroke="white" stroke-width="4"';const map={
  tiger:`<svg viewBox="0 0 240 170"><path ${fill} d="M62 100c5-43 31-68 66-68s60 25 66 68c4 29-21 50-66 50s-70-21-66-50Z"/><path ${common} d="M77 52 51 29M178 52l25-23M91 70l-24-14M149 70l24-14M96 101h1M143 101h1M103 121c12 10 24 10 36 0M120 106l-10 12h20l-10-12ZM82 133l-23 14M158 133l23 14"/><path ${common} d="M112 47l-8 25M128 47l8 25M120 40v28"/></svg>`,
  neo:`<svg viewBox="0 0 240 170"><path ${fill} d="M58 104c8-39 36-62 75-58 31 3 49 26 52 56-19-7-35-4-49 8-22 19-52 22-78-6Z"/><path ${common} d="M72 67c21-22 58-23 82-3M91 86c18-11 35-10 51 3M98 111c18 10 38 8 55-6M180 52c13-12 27-11 37 1-14 3-22 13-29 25M57 58c-12-14-26-14-35-3 14 4 22 15 29 27"/><circle cx="116" cy="83" r="5" fill="white"/></svg>`,
  blackwork:`<svg viewBox="0 0 240 170"><path ${common} d="M120 22 168 82 120 148 72 82 120 22Z"/><path ${common} d="M120 22v126M72 82h96M92 57l56 50M148 57l-56 50"/><circle cx="120" cy="82" r="20" fill="rgba(214,40,40,.36)" stroke="white" stroke-width="4"/></svg>`,
  fineline:`<svg viewBox="0 0 240 170"><path ${common} stroke-width="3" d="M120 145c0-42 0-72 0-112M120 72c-34-29-58-27-72-4 27 2 47 12 72 4ZM121 100c34-29 58-27 72-4-27 2-47 12-72 4Z"/><path ${common} stroke-width="3" d="M99 42c10 7 17 17 21 30M141 70c-10 7-17 17-20 30"/></svg>`,
  realismo:`<svg viewBox="0 0 240 170"><path ${fill} d="M85 78c0-30 20-52 35-52s35 22 35 52c0 26-15 54-35 54S85 104 85 78Z"/><path ${common} d="M95 78c12-9 23-9 34 0M133 78c10-8 20-8 30 0M120 82l-9 26h18M104 122c14 8 27 8 41 0"/><path ${common} stroke-width="3" d="M82 136c20 14 56 14 76 0"/></svg>`,
  japones:`<svg viewBox="0 0 240 170"><path ${fill} d="M63 104c25-49 73-68 119-47-28 7-37 25-38 42-2 30-37 45-81 5Z"/><path ${common} d="M83 97c20-16 45-23 76-19M74 125c33 21 75 15 96-14M174 51c14-15 30-18 47-6M39 122c21 7 39 18 54 35M104 67l-8-26M127 64l11-27"/><circle cx="147" cy="77" r="5" fill="white"/></svg>`,
  lettering:`<svg viewBox="0 0 240 170"><path ${common} stroke-width="4" d="M35 104c20-42 48-42 43 0-4 31-37 24-29 2 7-19 35-14 54-5 27 13 54 9 76-20"/><path ${common} stroke-width="3" d="M70 126h100"/><text x="72" y="82" fill="white" font-size="34" font-family="Georgia" font-style="italic">Ink</text></svg>`,
  minimal:`<svg viewBox="0 0 240 170"><circle cx="120" cy="84" r="42" ${common} stroke-width="4"/><path ${common} stroke-width="4" d="M120 42v84M78 84h84M90 54l60 60M150 54l-60 60"/></svg>`
};return map[kind]||map.minimal;}
function render(){document.getElementById('view-dashboard').innerHTML=dashboard();document.getElementById('view-agenda').innerHTML=`<div class="card"><h2 class="display">Agenda de muestra</h2>${apptList()}<br><button class="btn btn-primary" onclick="openModal('nueva-cita')">Simular nueva cita</button></div>`;document.getElementById('view-clientes').innerHTML=`<div class="card"><h2 class="display">Clientes de muestra</h2>${table(['Cliente','WhatsApp','Instagram','Notas'],clientesRows(),'clientes')}<br><button class="btn btn-primary" onclick="openModal('nuevo-cliente')">Simular nuevo cliente</button></div>`;document.getElementById('view-disenos').innerHTML=`<div class="grid-3">${estilos.map(d=>`<div class="card"><div class="style-preview">${styleSvg(d.icon)}</div><h3 class="display">${d.name}</h3><p class="muted tiny">${d.desc}</p></div>`).join('')}</div>`;document.getElementById('view-ventas').innerHTML=`<div class="card"><h2 class="display">Ventas y anticipos de muestra</h2>${ventasList()}<br><button class="btn btn-primary" onclick="openModal('nueva-venta')">Simular venta</button></div>`;document.getElementById('view-artistas').innerHTML=`<div class="card"><h2 class="display">Artistas de muestra</h2>${table(['Artista','Especialidad','Contacto','Notas'],artistasRows(),'artistas')}<br><button class="btn btn-primary" onclick="openModal('nuevo-artista')">Simular artista</button></div>`;document.getElementById('view-marketing').innerHTML=`<div class="grid-2"><div class="card"><h2 class="display">Marketing demo</h2><p class="muted">Plantillas de muestra para confirmar citas, pedir anticipos y dar cuidados posteriores.</p><button class="btn btn-primary" onclick="openModal('mensaje')">Simular plantilla</button></div><div class="card"><h3 class="display">Plantillas</h3>${table(['Nombre','Objetivo','Mensaje'],mensajesRows(),'mensajes')}</div></div>`;document.getElementById('view-config').innerHTML=`<div class="card"><h2 class="display">Configuración demo</h2><div class="notice">Esta demo no guarda datos, no importa respaldos y no debe usarse para información real de clientes.</div><br><div class="ok">La versión vendible activa captura, respaldo JSON, importación y borrado local.</div><br>${table(['Campo','Valor'],[{id:'config',cells:['Estudio demo',safe(studio)]},{id:'config2',cells:['Licencia demo',safe(lic)]},{id:'config3',cells:['Almacenamiento','Bloqueado en demo']}],'noop')}<div class="toolbar"><button class="btn btn-ghost locked" onclick="showDemoLock('Exportar respaldo está bloqueado en la demo.')">Exportar respaldo JSON</button><button class="btn btn-ghost locked" onclick="showDemoLock('Importar respaldo está bloqueado en la demo.')">Importar respaldo</button><button class="btn btn-ghost locked" onclick="showDemoLock('Borrar datos no aplica en la demo porque no se guarda información.')">Borrar datos</button></div></div>`;}
function modalForm(fields,button,handler){return `<form onsubmit="${handler}(event)"><div class="notice" style="margin-bottom:12px">Modo demo: puedes ver el formulario, pero el registro no se guardará.</div><div class="form-row">${fields.map(f=>f.type==='textarea'?`<textarea class="form-input" rows="5" name="${f.name}" placeholder="${f.label}" ${f.required?'required':''}></textarea>`:`<input class="form-input" name="${f.name}" type="${f.type||'text'}" placeholder="${f.label}" ${f.required?'required':''}>`).join('')}</div><br><button class="btn btn-primary" type="submit">${button}</button></form>`}
function openModal(type){const t=document.getElementById('modalTitle'),b=document.getElementById('modalBody');if(type==='nueva-cita'){t.textContent='Simular nueva cita';b.innerHTML=modalForm([{name:'cliente',label:'Cliente',required:true},{name:'fecha',label:'Fecha y hora',type:'datetime-local',required:true},{name:'servicio',label:'Servicio / estilo',required:true},{name:'artista',label:'Artista asignado'},{name:'anticipo',label:'Anticipo',type:'number'}],'Ver bloqueo demo','saveCita')}else if(type==='nuevo-cliente'){t.textContent='Simular nuevo cliente';b.innerHTML=modalForm([{name:'nombre',label:'Nombre',required:true},{name:'whatsapp',label:'WhatsApp'},{name:'instagram',label:'Instagram'},{name:'notas',label:'Notas'}],'Ver bloqueo demo','saveCliente')}else if(type==='nuevo-artista'){t.textContent='Simular nuevo artista';b.innerHTML=modalForm([{name:'nombre',label:'Nombre artístico',required:true},{name:'especialidad',label:'Especialidad'},{name:'contacto',label:'Instagram / contacto'},{name:'notas',label:'Notas'}],'Ver bloqueo demo','saveArtista')}else if(type==='nueva-venta'){t.textContent='Simular venta';b.innerHTML=modalForm([{name:'concepto',label:'Concepto',required:true},{name:'tipo',label:'Tipo: Anticipo / Sesión / Producto',required:true},{name:'monto',label:'Monto',type:'number',required:true},{name:'fecha',label:'Fecha',type:'date'}],'Ver bloqueo demo','saveVenta')}else{t.textContent='Simular plantilla';b.innerHTML=modalForm([{name:'nombre',label:'Nombre de la plantilla',required:true},{name:'objetivo',label:'Objetivo'},{name:'texto',label:'Escribe aquí tu mensaje',type:'textarea',required:true}],'Ver bloqueo demo','saveMensaje')}document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function preventDemo(e){e.preventDefault();closeModal();showDemoLock('Registro bloqueado: esta demo no almacena información.');}
function saveCita(e){preventDemo(e)}function saveCliente(e){preventDemo(e)}function saveArtista(e){preventDemo(e)}function saveVenta(e){preventDemo(e)}function saveMensaje(e){preventDemo(e)}
function deleteItem(){showDemoLock('Eliminar registros está bloqueado en la demo.')}
function exportBackup(){showDemoLock('Exportar respaldo está bloqueado en la demo.')}
function importBackup(){showDemoLock('Importar respaldo está bloqueado en la demo.')}
function resetData(){showDemoLock('Borrar datos no aplica en demo.')}
document.querySelectorAll('.nav button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('view-'+btn.dataset.view).classList.add('active')}));
setIdentity();render();
</script>
</body>
</html>
